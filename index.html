
<h2 class="sr-only">Medfuture Australia keyword demand dashboard with candidate and client filters for April to June 2026</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0;font-family:var(--font-sans)}
.top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.2rem;flex-wrap:wrap;gap:8px}
.top-left h1{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.top-left p{font-size:12px;color:var(--color-text-secondary);margin-top:3px}
.top-right{display:flex;gap:8px}
.intent-btn{font-size:12px;padding:6px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-weight:500}
.intent-btn.all-active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.intent-btn.candidate-active{background:#E6F1FB;color:#0C447C;border-color:#378ADD}
.intent-btn.client-active{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.filter-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.fg{display:flex;flex-direction:column;gap:5px}
.fg-label{font-size:11px;color:var(--color-text-secondary);font-weight:500}
.fg-btns{display:flex;gap:4px;flex-wrap:wrap}
.fb{font-size:11px;padding:3px 9px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.fb.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.search-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.search-row input{flex:1;font-size:12px;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary)}
.cnt{font-size:11px;color:var(--color-text-secondary);margin-bottom:8px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.ld{width:10px;height:10px;border-radius:2px}
table{width:100%;font-size:12px;border-collapse:collapse;table-layout:fixed}
th{text-align:left;padding:8px 10px;color:var(--color-text-secondary);font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
td{padding:7px 10px;color:var(--color-text-primary);border-bottom:0.5px solid var(--color-border-tertiary);word-break:break-word}
.grp td{font-weight:500;font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);padding:5px 10px}
tr.data:hover td{background:var(--color-background-secondary)}
.b{font-size:10px;padding:2px 8px;border-radius:var(--border-radius-md);display:inline-block;white-space:nowrap;font-weight:500}
.bc{background:#E6F1FB;color:#0C447C}
.bk{background:#FAEEDA;color:#633806}
.vol-bar{height:4px;border-radius:2px;margin-top:3px}
</style>

<div class="wrap">
  <div class="top">
    <div class="top-left">
      <h1><i class="ti ti-chart-bar" aria-hidden="true" style="font-size:16px;margin-right:6px;vertical-align:-2px"></i>Medfuture AU — keyword demand report</h1>
      <p><i class="ti ti-calendar" aria-hidden="true" style="font-size:12px;margin-right:3px;vertical-align:-1px"></i>April – June 2026 &nbsp;·&nbsp; Source: SEMrush &nbsp;·&nbsp; Sample data</p>
    </div>
    <div class="top-right">
      <button class="intent-btn all-active" onclick="setIntent('all',this)">All</button>
      <button class="intent-btn" onclick="setIntent('Candidate',this)"><i class="ti ti-user" aria-hidden="true" style="font-size:12px;margin-right:3px"></i>Candidate</button>
      <button class="intent-btn" onclick="setIntent('Client',this)"><i class="ti ti-building" aria-hidden="true" style="font-size:12px;margin-right:3px"></i>Client</button>
    </div>
  </div>

  <div class="card">
    <div class="filter-bar">
      <div class="fg">
        <span class="fg-label"><i class="ti ti-tag" aria-hidden="true" style="font-size:11px;margin-right:3px"></i>Category</span>
        <div class="fg-btns">
          <button class="fb active" onclick="sf('cat','all',this)">All</button>
          <button class="fb" onclick="sf('cat','GP',this)">GP</button>
          <button class="fb" onclick="sf('cat','Physiotherapist',this)">Physio</button>
          <button class="fb" onclick="sf('cat','OT',this)">OT</button>
          <button class="fb" onclick="sf('cat','Psychologist',this)">Psychologist</button>
          <button class="fb" onclick="sf('cat','Dentist',this)">Dentist</button>
          <button class="fb" onclick="sf('cat','Psychiatrist',this)">Psychiatrist</button>
          <button class="fb" onclick="sf('cat','Speech Pathologist',this)">Speech Path</button>
          <button class="fb" onclick="sf('cat','Podiatrist',this)">Podiatrist</button>
        </div>
      </div>
      <div class="fg">
        <span class="fg-label"><i class="ti ti-map-pin" aria-hidden="true" style="font-size:11px;margin-right:3px"></i>Searching from</span>
        <div class="fg-btns">
          <button class="fb active" onclick="sf('from','all',this)">All</button>
          <button class="fb" onclick="sf('from','Melbourne',this)">Melbourne</button>
          <button class="fb" onclick="sf('from','Sydney',this)">Sydney</button>
          <button class="fb" onclick="sf('from','Brisbane',this)">Brisbane</button>
          <button class="fb" onclick="sf('from','Perth',this)">Perth</button>
          <button class="fb" onclick="sf('from','Adelaide',this)">Adelaide</button>
          <button class="fb" onclick="sf('from','Canberra',this)">Canberra</button>
        </div>
      </div>
      <div class="fg">
        <span class="fg-label"><i class="ti ti-target" aria-hidden="true" style="font-size:11px;margin-right:3px"></i>Target city</span>
        <div class="fg-btns">
          <button class="fb active" onclick="sf('target','all',this)">All</button>
          <button class="fb" onclick="sf('target','Melbourne',this)">Melbourne</button>
          <button class="fb" onclick="sf('target','Sydney',this)">Sydney</button>
          <button class="fb" onclick="sf('target','Brisbane',this)">Brisbane</button>
          <button class="fb" onclick="sf('target','Perth',this)">Perth</button>
          <button class="fb" onclick="sf('target','Adelaide',this)">Adelaide</button>
          <button class="fb" onclick="sf('target','Canberra',this)">Canberra</button>
        </div>
      </div>
    </div>

    <div class="search-row">
      <i class="ti ti-search" aria-hidden="true" style="font-size:14px;color:var(--color-text-secondary)"></i>
      <input type="text" id="searchBox" placeholder="Search keywords..." oninput="render()">
    </div>

    <div class="legend" id="legend"></div>
    <div class="cnt" id="cnt"></div>

    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th style="width:4%">#</th>
            <th style="width:28%">Related query</th>
            <th style="width:15%">Searching from</th>
            <th style="width:14%">Target city</th>
            <th style="width:10%">Intent</th>
            <th style="width:12%">Volume</th>
          </tr>
        </thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const cityColors={
  'Melbourne':'#B5D4F4','Sydney':'#9FE1CB','Brisbane':'#FAC775',
  'Perth':'#F5C4B3','Adelaide':'#CECBF6','Canberra':'#C0DD97','Gold Coast':'#F4C0D1'
};

const data=[
  {cat:'GP',seed:'GP',query:'gp jobs melbourne',from:'Melbourne',target:'Melbourne',intent:'Candidate',vol:320},
  {cat:'GP',seed:'GP',query:'gp jobs sydney',from:'Melbourne',target:'Sydney',intent:'Candidate',vol:260},
  {cat:'GP',seed:'GP',query:'gp jobs brisbane',from:'Melbourne',target:'Brisbane',intent:'Candidate',vol:1600},
  {cat:'GP',seed:'GP',query:'gp jobs near me',from:'Canberra',target:'Canberra',intent:'Candidate',vol:980},
  {cat:'GP',seed:'GP',query:'gp recruitment sydney',from:'Perth',target:'Sydney',intent:'Client',vol:880},
  {cat:'GP',seed:'GP',query:'gp recruitment melbourne',from:'Sydney',target:'Melbourne',intent:'Client',vol:640},
  {cat:'GP',seed:'Locum GP',query:'locum gp jobs sydney',from:'Melbourne',target:'Sydney',intent:'Candidate',vol:480},
  {cat:'GP',seed:'Locum GP',query:'locum gp jobs near me',from:'Brisbane',target:'Brisbane',intent:'Candidate',vol:320},
  {cat:'GP',seed:'Locum GP',query:'locum gp jobs perth',from:'Adelaide',target:'Perth',intent:'Candidate',vol:720},
  {cat:'GP',seed:'VR GP',query:'vr gp jobs brisbane',from:'Canberra',target:'Brisbane',intent:'Candidate',vol:480},
  {cat:'GP',seed:'Rural Generalist',query:'rural gp jobs queensland',from:'Melbourne',target:'Queensland',intent:'Candidate',vol:420},
  {cat:'Physiotherapist',seed:'Physiotherapist',query:'physio jobs melbourne',from:'Brisbane',target:'Melbourne',intent:'Candidate',vol:860},
  {cat:'Physiotherapist',seed:'Physiotherapist',query:'physio jobs sydney',from:'Perth',target:'Sydney',intent:'Candidate',vol:720},
  {cat:'Physiotherapist',seed:'Physiotherapist',query:'physio jobs near me',from:'Brisbane',target:'Brisbane',intent:'Candidate',vol:860},
  {cat:'Physiotherapist',seed:'Physiotherapist',query:'physiotherapist recruitment brisbane',from:'Melbourne',target:'Brisbane',intent:'Client',vol:540},
  {cat:'OT',seed:'Occupational Therapist',query:'ot jobs brisbane',from:'Sydney',target:'Brisbane',intent:'Candidate',vol:640},
  {cat:'OT',seed:'Occupational Therapist',query:'ot jobs near me',from:'Perth',target:'Perth',intent:'Candidate',vol:480},
  {cat:'OT',seed:'Occupational Therapist',query:'ot recruitment perth',from:'Melbourne',target:'Perth',intent:'Client',vol:640},
  {cat:'Psychologist',seed:'Psychologist',query:'psychologist jobs sydney',from:'Brisbane',target:'Sydney',intent:'Candidate',vol:720},
  {cat:'Psychologist',seed:'Psychologist',query:'psychologist jobs near me',from:'Sydney',target:'Sydney',intent:'Candidate',vol:600},
  {cat:'Psychologist',seed:'Clinical Psychologist',query:'clinical psychologist recruitment melbourne',from:'Perth',target:'Melbourne',intent:'Client',vol:480},
  {cat:'Dentist',seed:'Dentist',query:'dentist jobs brisbane',from:'Sydney',target:'Brisbane',intent:'Candidate',vol:560},
  {cat:'Dentist',seed:'Dentist',query:'dentist jobs near me',from:'Adelaide',target:'Adelaide',intent:'Candidate',vol:420},
  {cat:'Dentist',seed:'Dentist',query:'dentist recruitment perth',from:'Adelaide',target:'Perth',intent:'Client',vol:380},
  {cat:'Psychiatrist',seed:'Psychiatrist',query:'psychiatrist jobs melbourne',from:'Brisbane',target:'Melbourne',intent:'Candidate',vol:420},
  {cat:'Psychiatrist',seed:'Psychiatrist',query:'psychiatrist recruitment sydney',from:'Perth',target:'Sydney',intent:'Client',vol:320},
  {cat:'Speech Pathologist',seed:'Speech Pathologist',query:'speech pathologist jobs sydney',from:'Melbourne',target:'Sydney',intent:'Candidate',vol:480},
  {cat:'Speech Pathologist',seed:'Speech Pathologist',query:'speech pathologist jobs near me',from:'Canberra',target:'Canberra',intent:'Candidate',vol:360},
  {cat:'Podiatrist',seed:'Podiatrist',query:'podiatrist jobs brisbane',from:'Sydney',target:'Brisbane',intent:'Candidate',vol:320},
  {cat:'Podiatrist',seed:'Podiatrist',query:'podiatrist jobs near me',from:'Melbourne',target:'Melbourne',intent:'Candidate',vol:280},
];

const maxVol=Math.max(...data.map(d=>d.vol));
let cf='all',intentF='all',ff='all',tf='all';

function setIntent(val,btn){
  intentF=val;
  document.querySelectorAll('.intent-btn').forEach(b=>b.classList.remove('all-active','candidate-active','client-active'));
  if(val==='all')btn.classList.add('all-active');
  else if(val==='Candidate')btn.classList.add('candidate-active');
  else btn.classList.add('client-active');
  render();
}

function sf(type,val,btn){
  if(type==='cat'){cf=val;document.querySelectorAll('.fg:nth-of-type(1) .fb').forEach(b=>b.classList.remove('active'));}
  else if(type==='from'){ff=val;document.querySelectorAll('.fg:nth-of-type(2) .fb').forEach(b=>b.classList.remove('active'));}
  else{tf=val;document.querySelectorAll('.fg:nth-of-type(3) .fb').forEach(b=>b.classList.remove('active'));}
  btn.classList.add('active');
  render();
}

function render(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const f=data.filter(r=>
    (cf==='all'||r.cat===cf)&&
    (intentF==='all'||r.intent===intentF)&&
    (ff==='all'||r.from===ff)&&
    (tf==='all'||r.target===tf)&&
    (!q||r.query.includes(q)||r.cat.toLowerCase().includes(q)||r.seed.toLowerCase().includes(q))
  );

  const usedCities=[...new Set(f.map(r=>r.from))];
  document.getElementById('legend').innerHTML=usedCities.map(c=>`
    <span class="li"><span class="ld" style="background:${cityColors[c]||'#ddd'}"></span>${c}</span>
  `).join('');

  document.getElementById('cnt').textContent=`Showing ${f.length} of ${data.length} keywords`;

  let html='',lastSeed='',n=0;
  f.forEach(r=>{
    n++;
    const bg=cityColors[r.from]||'#eee';
    const pct=Math.round((r.vol/maxVol)*100);
    if(r.seed!==lastSeed){
      lastSeed=r.seed;
      html+=`<tr class="grp"><td colspan="6"><i class="ti ti-tag" aria-hidden="true" style="font-size:11px;margin-right:4px"></i>${r.cat} — ${r.seed}</td></tr>`;
    }
    html+=`<tr class="data" style="border-left:3px solid ${bg}">
      <td style="color:var(--color-text-secondary);font-size:11px">${n}</td>
      <td>${r.query}</td>
      <td><span style="display:inline-flex;align-items:center;gap:5px;padding:2px 7px;border-radius:var(--border-radius-md);background:${bg}33;font-size:11px;color:var(--color-text-primary)"><span style="width:7px;height:7px;border-radius:50%;background:${bg}"></span>${r.from}</span></td>
      <td style="font-size:12px;color:var(--color-text-secondary)">${r.target}</td>
      <td><span class="b ${r.intent==='Candidate'?'bc':'bk'}">${r.intent}</span></td>
      <td><span style="font-weight:500;font-size:12px">${r.vol.toLocaleString()}</span><div class="vol-bar" style="width:${pct}%;background:${r.intent==='Candidate'?'#B5D4F4':'#FAC775'}"></div></td>
    </tr>`;
  });
  document.getElementById('tb').innerHTML=html||`<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--color-text-secondary)">No results found</td></tr>`;
}

render();
</script>
